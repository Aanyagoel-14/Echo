<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Echo · CP9 On-Device Validation</title>
    <!--
      CP9 part 1 — WebGPU + WebLLM GO/NO-GO gate.

      A standalone page (NOT part of the React bundle) so it can be opened on the
      iQOO via the live URL with zero build coupling. web-llm is pulled from a CDN
      on purpose: this page only has to PROVE the device can run a local model and
      report tokens/sec. CP11 adds web-llm as a real npm dependency inside the app.

      GO  = WebGPU present + model loads + one inference returns + tokens/sec shown.
      NO-GO (WebGPU missing/load fails) = stop and message the team (plan §3).
    -->
    <style>
      :root {
        --bg: #0b0b0f;
        --surface: #15151c;
        --border: #23232e;
        --accent: #2f6bff;
        --ink: #f4f4f6;
        --muted: #9a9aa6;
        --ok: #34d399;
        --bad: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
        max-width: 560px;
        margin-inline: auto;
      }
      h1 { font-size: 18px; margin: 0 0 4px; letter-spacing: -0.02em; }
      .sub { color: var(--muted); margin: 0 0 20px; font-size: 13px; }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 14px;
      }
      .row { display: flex; align-items: center; gap: 10px; }
      .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .pill { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
      .pill.ok { background: rgba(52, 211, 153, 0.15); color: var(--ok); }
      .pill.bad { background: rgba(248, 113, 113, 0.15); color: var(--bad); }
      .pill.wait { background: rgba(154, 154, 166, 0.15); color: var(--muted); }
      button, select {
        font: inherit;
        color: var(--ink);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
      }
      button.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; width: 100%; }
      button:disabled { opacity: 0.45; }
      select { width: 100%; margin-top: 8px; }
      .bar { height: 8px; background: #0e0e14; border-radius: 999px; overflow: hidden; margin-top: 10px; }
      .bar > span { display: block; height: 100%; width: 0; background: var(--accent); transition: width 0.2s; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); word-break: break-word; }
      .out { white-space: pre-wrap; background: #0e0e14; border-radius: 12px; padding: 12px; margin-top: 10px; min-height: 48px; }
      .stats { display: flex; gap: 18px; margin-top: 12px; flex-wrap: wrap; }
      .stat b { display: block; font-size: 22px; letter-spacing: -0.02em; }
      .stat span { color: var(--muted); font-size: 12px; }
      .verdict { text-align: center; font-size: 16px; font-weight: 700; padding: 14px; border-radius: 14px; }
      .verdict.go { background: rgba(52, 211, 153, 0.12); color: var(--ok); }
      .verdict.nogo { background: rgba(248, 113, 113, 0.12); color: var(--bad); }
    </style>
  </head>
  <body>
    <h1>Echo · On-Device Validation</h1>
    <p class="sub">CP9 part 1 — WebGPU + WebLLM GO/NO-GO. Run this on the iQOO.</p>

    <div class="card">
      <div class="row" style="justify-content: space-between">
        <span class="label">1 · WebGPU support</span>
        <span id="gpuPill" class="pill wait">checking…</span>
      </div>
      <div id="gpuInfo" class="mono" style="margin-top: 8px"></div>
    </div>

    <div class="card">
      <div class="label">2 · Model</div>
      <select id="model">
        <option value="Qwen2.5-1.5B-Instruct-q4f16_1-MLC">Qwen2.5-1.5B-Instruct (q4f16) — fast, start here</option>
        <option value="Qwen2.5-3B-Instruct-q4f16_1-MLC">Qwen2.5-3B-Instruct (q4f16) — push limits</option>
        <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama-3.2-3B-Instruct (q4f16) — push limits</option>
        <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama-3.2-1B-Instruct (q4f16) — smallest</option>
      </select>
      <button id="load" class="primary" style="margin-top: 12px" disabled>Load model (caches on device)</button>
      <div class="bar"><span id="prog"></span></div>
      <div id="loadMsg" class="mono" style="margin-top: 8px"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content: space-between">
        <span class="label">3 · Inference</span>
        <span id="runPill" class="pill wait">waiting for model</span>
      </div>
      <button id="run" class="primary" style="margin-top: 12px" disabled>
        Run test inference
      </button>
      <div id="out" class="out"></div>
      <div class="stats">
        <div class="stat"><b id="tps">—</b><span>decode tokens/sec</span></div>
        <div class="stat"><b id="prefill">—</b><span>prefill tokens/sec</span></div>
        <div class="stat"><b id="ttft">—</b><span>ms to first token</span></div>
      </div>
    </div>

    <div id="verdict" class="verdict" style="display: none"></div>

    <script type="module">
      const $ = (id) => document.getElementById(id)
      const setPill = (el, cls, text) => {
        el.className = 'pill ' + cls
        el.textContent = text
      }

      let gpuOK = false
      let inferOK = false

      function renderVerdict() {
        const v = $('verdict')
        v.style.display = 'block'
        if (gpuOK && inferOK) {
          v.className = 'verdict go'
          v.textContent = '✅ GO — on-device pipeline validated on this device'
        } else if (!gpuOK) {
          v.className = 'verdict nogo'
          v.textContent = '⛔ NO-GO — WebGPU unavailable. Message the team (plan §3 fallback).'
        }
      }

      // ---- Step 1: WebGPU detection -------------------------------------------
      async function checkGPU() {
        if (!('gpu' in navigator)) {
          setPill($('gpuPill'), 'bad', 'not available')
          $('gpuInfo').textContent =
            'navigator.gpu is undefined. WebGPU may need enabling in chrome://flags (#enable-unsafe-webgpu) or a newer browser.'
          renderVerdict()
          return false
        }
        try {
          const adapter = await navigator.gpu.requestAdapter()
          if (!adapter) {
            setPill($('gpuPill'), 'bad', 'no adapter')
            $('gpuInfo').textContent = 'navigator.gpu exists but requestAdapter() returned null.'
            renderVerdict()
            return false
          }
          setPill($('gpuPill'), 'ok', 'available')
          const info = adapter.info || {}
          $('gpuInfo').textContent =
            'adapter: ' + (info.vendor || '?') + ' / ' + (info.architecture || info.device || 'gpu')
          gpuOK = true
          $('load').disabled = false
          return true
        } catch (e) {
          setPill($('gpuPill'), 'bad', 'error')
          $('gpuInfo').textContent = String(e)
          renderVerdict()
          return false
        }
      }

      // ---- Step 2 + 3: load model, run one inference --------------------------
      let engine = null
      let CreateMLCEngine = null

      $('load').addEventListener('click', async () => {
        $('load').disabled = true
        $('model').disabled = true
        const modelId = $('model').value
        try {
          if (!CreateMLCEngine) {
            $('loadMsg').textContent = 'fetching web-llm from CDN…'
            ;({ CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm'))
          }
          engine = await CreateMLCEngine(modelId, {
            initProgressCallback: (r) => {
              $('loadMsg').textContent = r.text
              $('prog').style.width = Math.round((r.progress || 0) * 100) + '%'
            },
          })
          $('prog').style.width = '100%'
          $('loadMsg').textContent = 'model ready: ' + modelId
          setPill($('runPill'), 'ok', 'ready')
          $('run').disabled = false
        } catch (e) {
          $('loadMsg').textContent = 'LOAD FAILED: ' + (e?.message || e)
          setPill($('runPill'), 'bad', 'load failed')
          $('load').disabled = false
          $('model').disabled = false
          renderVerdict()
        }
      })

      $('run').addEventListener('click', async () => {
        $('run').disabled = true
        setPill($('runPill'), 'wait', 'generating…')
        $('out').textContent = ''
        $('tps').textContent = $('prefill').textContent = $('ttft').textContent = '—'
        const started = performance.now()
        let firstAt = null
        try {
          const stream = await engine.chat.completions.create({
            stream: true,
            stream_options: { include_usage: true },
            messages: [
              {
                role: 'user',
                content:
                  'Write a one-sentence Instagram hook for a steel water bottle. Be punchy.',
              },
            ],
          })
          let usage = null
          for await (const chunk of stream) {
            const delta = chunk.choices[0]?.delta?.content
            if (delta) {
              if (firstAt === null) {
                firstAt = performance.now()
                $('ttft').textContent = Math.round(firstAt - started)
              }
              $('out').textContent += delta
            }
            if (chunk.usage) usage = chunk.usage
          }
          if (usage?.extra) {
            $('tps').textContent = (usage.extra.decode_tokens_per_s || 0).toFixed(1)
            $('prefill').textContent = (usage.extra.prefill_tokens_per_s || 0).toFixed(1)
          }
          inferOK = true
          setPill($('runPill'), 'ok', 'done')
          $('run').disabled = false
          renderVerdict()
        } catch (e) {
          $('out').textContent = 'INFERENCE FAILED: ' + (e?.message || e)
          setPill($('runPill'), 'bad', 'failed')
          $('run').disabled = false
        }
      })

      checkGPU()
    </script>
  </body>
</html>
