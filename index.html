<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <!--
      Apply the saved theme before first paint so a returning dark-mode user
      never sees a flash of light. Default (no/invalid value) stays light.
    -->
    <script>
      try {
        var t = localStorage.getItem('echo.theme.v1')
        if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/echo-icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- Light default; the theme lib updates this on toggle to match the bar. -->
    <meta name="theme-color" content="#f4f6f9" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Echo" />
    <meta
      name="description"
      content="Echo — the creator's digital twin. One input becomes a full multi-platform content kit."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Echo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
